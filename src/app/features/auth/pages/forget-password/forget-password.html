<div class="auth-container">

  <div class="auth-card">

    <h2>Forgot Password</h2>

    <p>
      Enter your email address
    </p>

    <form
      [formGroup]="forgetForm"
      (ngSubmit)="sendCode()">

      <div class="form-group">

        <label>Email</label>

        <input
          type="email"
          formControlName="email">

      </div>

      <button type="submit"
      >

        Send Code

      </button>
       @if (successMessage) {

  <p class="success">
    {{ successMessage }}
  </p>

} @else if (errorMessage) {

  <p class="error">
    {{ errorMessage }}
  </p>

}

    </form>

  </div>

</div>
